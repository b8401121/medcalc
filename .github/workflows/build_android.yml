name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CJK Font
        run: |
          wget -q "https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" \
            -O NotoSansCJK.otf

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v3-

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android cmdline-tools for Buildozer
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          TOOLS_DIR="$SDK_DIR/tools"
          mkdir -p "$TOOLS_DIR/bin"

          # Download Android command-line tools (sdkmanager)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdtools

          # Copy sdkmanager to the LEGACY path that Buildozer expects
          cp /tmp/cmdtools/cmdline-tools/bin/sdkmanager "$TOOLS_DIR/bin/"
          cp -r /tmp/cmdtools/cmdline-tools/lib "$TOOLS_DIR/"
          chmod +x "$TOOLS_DIR/bin/sdkmanager"

          # Accept all licenses (standard + preview)
          yes | "$TOOLS_DIR/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses 2>/dev/null || true

          # Install stable build-tools 34 (avoids the RC license issue)
          "$TOOLS_DIR/bin/sdkmanager" --sdk_root="$SDK_DIR" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools"

      - name: Build APK with Buildozer Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medcalc-apk
          path: bin/*.apk
          if-no-files-found: error
