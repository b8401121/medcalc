name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev cmake libffi-dev \
            libssl-dev build-essential

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade buildozer cython

      - name: Download CJK Font (Noto Sans CJK TC)
        run: |
          wget -q "https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" -O NotoSansCJK.otf
          echo "Font downloaded: $(ls -lh NotoSansCJK.otf)"

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug 2>&1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medcalc-apk
          path: bin/*.apk
          if-no-files-found: error
