name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CJK Font
        run: |
          wget -q "https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" \
            -O NotoSansCJK.otf

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v3-

      - name: Build APK with Buildozer Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "yes | buildozer -v android debug 2>&1"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medcalc-apk
          path: bin/*.apk
          if-no-files-found: error
