name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CJK Font
        run: |
          wget -q "https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" \
            -O NotoSansCJK.otf

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Pre-accept Android SDK licenses
        run: |
          # Pre-write license hashes into the mounted buildozer SDK directory
          # so the Docker container sees them as already accepted
          SDK_LICENSES="$HOME/.buildozer/android/platform/android-sdk/licenses"
          mkdir -p "$SDK_LICENSES"
          # Standard SDK license
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > "$SDK_LICENSES/android-sdk-license"
          # Preview / RC license (covers build-tools 37-rc2)
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910\n' \
            > "$SDK_LICENSES/android-sdk-preview-license"

      - name: Build APK with Buildozer Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medcalc-apk
          path: bin/*.apk
          if-no-files-found: error
